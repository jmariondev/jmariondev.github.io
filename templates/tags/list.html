{% extends "base.html" %}

{% block title %}Tags | {{ config.title }}{% endblock title %}

{% block content %}
<h1>Tags</h1>

{% if terms %}
<ul class="tag-list">
    {% for term in terms %}
    <li>
        <a class="tag" href="{{ term.permalink }}">#{{ term.name }}</a>
        <span class="tag-count">{{ term.pages | length }}</span>
    </li>
    {% endfor %}
</ul>
{% else %}
<p>No tags yet.</p>
{% endif %}
{% endblock content %}
